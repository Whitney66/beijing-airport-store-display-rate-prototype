<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京机场店商品出样率统计表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', '微软雅黑', sans-serif;
            background: #f5f7fa;
            color: #262626;
            min-width: 1366px;
        }

        .topbar {
            height: 56px;
            background: linear-gradient(180deg, #2f69df 0%, #2b60d3 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px 0 14px;
            color: #fff;
            box-shadow: 0 1px 4px rgba(20, 54, 120, 0.2);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-right: 28px;
            flex-shrink: 0;
        }

        .brand-logo {
            width: 34px;
            height: 34px;
            display: block;
            flex-shrink: 0;
        }

        .brand-text {
            font-size: 19px;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .main-nav {
            display: flex;
            align-items: stretch;
            height: 56px;
            overflow: hidden;
        }

        .main-nav-item {
            display: flex;
            align-items: center;
            padding: 0 22px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.95);
            text-decoration: none;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .main-nav-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .main-nav-item.active {
            background: rgba(255, 255, 255, 0.15);
            font-weight: 600;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .header-search {
            width: 210px;
            height: 34px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.96);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
        }

        .header-search input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 13px;
            color: #262626;
            background: transparent;
        }

        .header-search-icon,
        .header-icon {
            color: #fff;
            font-size: 18px;
            line-height: 1;
        }

        .header-search-icon {
            color: #8c8c8c;
            font-size: 14px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffffff 0%, #e8eefc 100%);
            color: #c77f13;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            border: 2px solid rgba(255, 255, 255, 0.7);
        }

        .subbar {
            height: 32px;
            background: #ffffff;
            border-bottom: 1px solid #dfe6f2;
            padding: 0 14px;
            display: flex;
            align-items: center;
        }

        .subbar-tab {
            height: 28px;
            padding: 0 16px;
            border-radius: 4px 4px 0 0;
            background: #2f69df;
            color: #ffffff;
            display: inline-flex;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
        }

        .container {
            width: 100%;
            padding: 16px;
        }

        .panel {
            background: #ffffff;
            border: 1px solid #e4eaf3;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(31, 45, 61, 0.05);
        }

        .filter-section {
            padding: 16px;
            margin-bottom: 14px;
        }

        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            cursor: pointer;
        }

        .filter-title {
            font-size: 15px;
            font-weight: 600;
            color: #1f2d3d;
        }

        .filter-toggle {
            color: #2f69df;
            font-size: 13px;
        }

        .filter-content {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            flex-wrap: nowrap;
        }

        .filter-content.collapsed {
            display: none;
        }

        .filter-group {
            position: relative;
            flex: 0 0 auto;
        }

        .filter-group.date-group {
            width: 160px;
        }

        .filter-group.store-group {
            width: 240px;
        }

        .filter-group.category-group,
        .filter-group.class-group,
        .filter-group.brand-group {
            width: 220px;
        }

        .filter-label {
            display: block;
            font-size: 12px;
            color: #5c6b7a;
            margin-bottom: 6px;
            line-height: 1;
        }

        .filter-input,
        .select-box {
            width: 100%;
            min-height: 36px;
            border: 1px solid #d9e2ef;
            border-radius: 6px;
            background: #ffffff;
            font-size: 13px;
            color: #262626;
        }

        .filter-input {
            padding: 0 10px;
            outline: none;
        }

        .filter-input:focus,
        .select-box.open {
            border-color: #2f69df;
            box-shadow: 0 0 0 2px rgba(47, 105, 223, 0.12);
        }

        .select-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 6px 10px;
            cursor: pointer;
            position: relative;
        }

        .select-summary {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            flex: 1;
            overflow: hidden;
        }

        .summary-pill {
            max-width: 100%;
            height: 22px;
            line-height: 22px;
            border-radius: 11px;
            padding: 0 8px;
            background: #edf4ff;
            color: #2f69df;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .summary-count {
            color: #8c8c8c;
            font-size: 12px;
            white-space: nowrap;
        }

        .select-arrow {
            color: #8c8c8c;
            font-size: 12px;
            flex-shrink: 0;
        }

        .select-panel {
            position: absolute;
            left: 0;
            top: calc(100% + 8px);
            width: 100%;
            background: #ffffff;
            border: 1px solid #d9e2ef;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(31, 45, 61, 0.15);
            padding: 10px;
            display: none;
            z-index: 30;
        }

        .select-panel.show {
            display: block;
        }

        .select-search {
            width: 100%;
            height: 32px;
            border: 1px solid #d9e2ef;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 12px;
            margin-bottom: 8px;
            outline: none;
        }

        .select-actions {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .select-actions button {
            border: none;
            background: none;
            color: #2f69df;
            cursor: pointer;
            padding: 0;
        }

        .option-list {
            max-height: 180px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 4px;
            border-radius: 6px;
            font-size: 12px;
            color: #262626;
        }

        .option-item:hover {
            background: #f5f8ff;
        }

        .option-item input {
            width: 14px;
            height: 14px;
            accent-color: #2f69df;
            flex-shrink: 0;
        }

        .action-section {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            margin-left: auto;
            padding-bottom: 0;
            flex-shrink: 0;
        }

        .btn {
            height: 36px;
            padding: 0 18px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: #2f69df;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #2158cb;
        }

        .btn-default {
            background: #ffffff;
            color: #324152;
            border-color: #d9e2ef;
        }

        .btn-default:hover {
            background: #f6f8fb;
        }

        .table-wrapper {
            overflow: hidden;
        }

        .table-header {
            padding: 14px 16px;
            border-bottom: 1px solid #edf1f7;
            font-size: 15px;
            font-weight: 600;
            color: #1f2d3d;
        }

        .table-container {
            max-height: 420px;
            overflow: auto;
        }

        .table {
            width: 100%;
            min-width: 1360px;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .table thead {
            position: sticky;
            top: 0;
            z-index: 5;
            background: #f0f3f8;
        }

        .table th,
        .table td {
            padding: 12px 14px;
            border-bottom: 1px solid #edf1f7;
            font-size: 13px;
            color: #262626;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .table th {
            text-align: left;
            font-weight: 600;
            color: #3b4a5a;
        }

        .table th.sortable {
            cursor: pointer;
            user-select: none;
        }

        .table th.sortable:hover {
            background: #e7edf7;
        }

        .table tbody tr:nth-child(even) {
            background: #fafbfd;
        }

        .table tbody tr:hover {
            background: #f1f6ff;
        }

        .table td.number {
            text-align: right;
        }

        .sort-icon {
            margin-left: 4px;
            color: #97a3af;
            font-size: 11px;
        }

        .sort-icon.active {
            color: #2f69df;
        }

        .empty-state {
            display: none;
            text-align: center;
            padding: 64px 20px;
            color: #8c8c8c;
        }

        .empty-state-title {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .empty-state-link {
            color: #2f69df;
            text-decoration: none;
            font-size: 13px;
        }

        .pagination-section {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            padding: 14px 16px 16px;
            border-top: 1px solid #edf1f7;
            background: #ffffff;
        }

        .page-text {
            font-size: 13px;
            color: #5c6b7a;
            margin-right: 4px;
        }

        .pagination-btn {
            height: 32px;
            padding: 0 12px;
            border: 1px solid #d9e2ef;
            background: #ffffff;
            color: #324152;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .pagination-btn:hover:not(:disabled) {
            background: #f6f8fb;
        }

        .pagination-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .pagination-input {
            width: 54px;
            height: 32px;
            border: 1px solid #d9e2ef;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
            outline: none;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            width: 320px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.2);
            padding: 20px;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 14px;
            color: #1f2d3d;
        }

        .modal-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }

        .modal-option {
            padding: 10px 12px;
            border: 1px solid #d9e2ef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .modal-option:hover {
            border-color: #2f69df;
            background: #f5f8ff;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <div class="brand">
                <img class="brand-logo" src="./logo.svg" alt="大数据平台 Logo">
                <div class="brand-text">大数据平台</div>
            </div>
            <nav class="main-nav">
                <a href="#" class="main-nav-item">经营看板</a>
                <a href="#" class="main-nav-item active">销售分析</a>
                <a href="#" class="main-nav-item">进销存分析</a>
                <a href="#" class="main-nav-item">库存分析</a>
                <a href="#" class="main-nav-item">顾客分析</a>
                <a href="#" class="main-nav-item">采购分析</a>
                <a href="#" class="main-nav-item">提货分析</a>
                <a href="#" class="main-nav-item">风险管控</a>
                <a href="#" class="main-nav-item">离线分析</a>
                <a href="#" class="main-nav-item">自定义分析</a>
                <a href="#" class="main-nav-item">数据填报</a>
            </nav>
        </div>
        <div class="topbar-right">
            <div class="header-search">
                <input type="text" placeholder="搜索">
                <span class="header-search-icon">⌕</span>
            </div>
            <span class="header-icon">🔔</span>
            <span class="header-icon">⛶</span>
            <div class="avatar">cdf</div>
        </div>
    </div>

    <div class="subbar">
        <div class="subbar-tab">销售汇总表</div>
    </div>

    <div class="container">
        <div class="panel filter-section">
            <div class="filter-header" onclick="toggleFilter()">
                <div class="filter-title">筛选条件</div>
                <div class="filter-toggle" id="toggleBtn">收起</div>
            </div>

            <div class="filter-content" id="filterContent">
                <div class="filter-group date-group">
                    <label class="filter-label" for="filterDate">日期</label>
                    <input type="date" class="filter-input" id="filterDate" value="2026-06-08">
                </div>

                <div class="filter-group store-group multi-select" data-name="store">
                    <label class="filter-label">门店</label>
                    <div class="select-box" onclick="toggleSelect(event, 'store')">
                        <div class="select-summary" id="storeSummary"></div>
                        <span class="select-arrow">▼</span>
                    </div>
                    <div class="select-panel" id="storePanel">
                        <input class="select-search" type="text" placeholder="搜索门店" oninput="filterOptions('store', this.value)">
                        <div class="select-actions">
                            <button type="button" onclick="selectAllOptions(event, 'store', true)">全选</button>
                            <button type="button" onclick="selectAllOptions(event, 'store', false)">清空</button>
                        </div>
                        <div class="option-list" id="storeOptions">
                            <label class="option-item"><input type="checkbox" data-select="store" value="[7222]中免集团(北京)免税品有限公司" checked onchange="renderAllSummaries()"><span>[7222]中免集团(北京)免税品有限公司</span></label>
                            <label class="option-item"><input type="checkbox" data-select="store" value="[7223]中免集团北京大兴国际机场免税品有限公司" checked onchange="renderAllSummaries()"><span>[7223]中免集团北京大兴国际机场免税品有限公司</span></label>
                        </div>
                    </div>
                </div>

                <div class="filter-group category-group multi-select" data-name="category">
                    <label class="filter-label">商品新分类</label>
                    <div class="select-box" onclick="toggleSelect(event, 'category')">
                        <div class="select-summary" id="categorySummary"></div>
                        <span class="select-arrow">▼</span>
                    </div>
                    <div class="select-panel" id="categoryPanel">
                        <input class="select-search" type="text" placeholder="搜索分类" oninput="filterOptions('category', this.value)">
                        <div class="select-actions">
                            <button type="button" onclick="selectAllOptions(event, 'category', true)">全选</button>
                            <button type="button" onclick="selectAllOptions(event, 'category', false)">清空</button>
                        </div>
                        <div class="option-list" id="categoryOptions">
                            <label class="option-item"><input type="checkbox" data-select="category" value="[010101]免税进口烟" checked onchange="renderAllSummaries()"><span>[010101]免税进口烟</span></label>
                            <label class="option-item"><input type="checkbox" data-select="category" value="[010102]免税进口酒" checked onchange="renderAllSummaries()"><span>[010102]免税进口酒</span></label>
                            <label class="option-item"><input type="checkbox" data-select="category" value="[010103]免税国产烟" checked onchange="renderAllSummaries()"><span>[010103]免税国产烟</span></label>
                            <label class="option-item"><input type="checkbox" data-select="category" value="[010104]免税国产酒" onchange="renderAllSummaries()"><span>[010104]免税国产酒</span></label>
                            <label class="option-item"><input type="checkbox" data-select="category" value="[010105]免税香化" onchange="renderAllSummaries()"><span>[010105]免税香化</span></label>
                        </div>
                    </div>
                </div>

                <div class="filter-group class-group multi-select" data-name="class">
                    <label class="filter-label">大类</label>
                    <div class="select-box" onclick="toggleSelect(event, 'class')">
                        <div class="select-summary" id="classSummary"></div>
                        <span class="select-arrow">▼</span>
                    </div>
                    <div class="select-panel" id="classPanel">
                        <input class="select-search" type="text" placeholder="搜索大类" oninput="filterOptions('class', this.value)">
                        <div class="select-actions">
                            <button type="button" onclick="selectAllOptions(event, 'class', true)">全选</button>
                            <button type="button" onclick="selectAllOptions(event, 'class', false)">清空</button>
                        </div>
                        <div class="option-list" id="classOptions">
                            <label class="option-item"><input type="checkbox" data-select="class" value="[01]进口酒" checked onchange="renderAllSummaries()"><span>[01]进口酒</span></label>
                            <label class="option-item"><input type="checkbox" data-select="class" value="[02]进口烟" onchange="renderAllSummaries()"><span>[02]进口烟</span></label>
                            <label class="option-item"><input type="checkbox" data-select="class" value="[03]进口香化" onchange="renderAllSummaries()"><span>[03]进口香化</span></label>
                            <label class="option-item"><input type="checkbox" data-select="class" value="[04]国产酒" onchange="renderAllSummaries()"><span>[04]国产酒</span></label>
                            <label class="option-item"><input type="checkbox" data-select="class" value="[05]国产烟" onchange="renderAllSummaries()"><span>[05]国产烟</span></label>
                        </div>
                    </div>
                </div>

                <div class="filter-group brand-group multi-select" data-name="brand">
                    <label class="filter-label">品牌</label>
                    <div class="select-box" onclick="toggleSelect(event, 'brand')">
                        <div class="select-summary" id="brandSummary"></div>
                        <span class="select-arrow">▼</span>
                    </div>
                    <div class="select-panel" id="brandPanel">
                        <input class="select-search" type="text" placeholder="搜索品牌" oninput="filterOptions('brand', this.value)">
                        <div class="select-actions">
                            <button type="button" onclick="selectAllOptions(event, 'brand', true)">全选</button>
                            <button type="button" onclick="selectAllOptions(event, 'brand', false)">清空</button>
                        </div>
                        <div class="option-list" id="brandOptions">
                            <label class="option-item"><input type="checkbox" data-select="brand" value="[060139]Bulgari 宝格丽" checked onchange="renderAllSummaries()"><span>[060139]Bulgari 宝格丽</span></label>
                            <label class="option-item"><input type="checkbox" data-select="brand" value="[060140]Louis Vuitton" checked onchange="renderAllSummaries()"><span>[060140]Louis Vuitton</span></label>
                            <label class="option-item"><input type="checkbox" data-select="brand" value="[060141]Hermès" onchange="renderAllSummaries()"><span>[060141]Hermès</span></label>
                            <label class="option-item"><input type="checkbox" data-select="brand" value="[060142]Cartier" onchange="renderAllSummaries()"><span>[060142]Cartier</span></label>
                            <label class="option-item"><input type="checkbox" data-select="brand" value="[060143]Rolex" onchange="renderAllSummaries()"><span>[060143]Rolex</span></label>
                        </div>
                    </div>
                </div>

                <div class="action-section">
                    <button class="btn btn-primary" onclick="queryData()">查询</button>
                    <button class="btn btn-default" onclick="resetFilter()">重置</button>
                    <button class="btn btn-default" onclick="openExportModal()">导出</button>
                </div>
            </div>
        </div>

        <div class="panel table-wrapper">
            <div class="table-header">北京机场店商品出样率统计表</div>
            <div class="table-container" id="tableContainer">
                <table class="table" id="dataTable">
                    <thead>
                        <tr>
                            <th style="width: 120px;">日期</th>
                            <th style="width: 240px;">门店</th>
                            <th style="width: 180px;">商品新分类</th>
                            <th style="width: 120px;">大类</th>
                            <th style="width: 180px;">品牌</th>
                            <th style="width: 130px;" class="sortable" onclick="sortTable('正品SKU出样率', this)">正品SKU出样率 <span class="sort-icon">↕</span></th>
                            <th style="width: 130px;" class="sortable" onclick="sortTable('免值品SKU出样率', this)">免值品SKU出样率 <span class="sort-icon">↕</span></th>
                            <th style="width: 120px;" class="sortable" onclick="sortTable('正品SKU数量', this)">正品SKU数量 <span class="sort-icon">↕</span></th>
                            <th style="width: 130px;" class="sortable" onclick="sortTable('免值品SKU数量', this)">免值品SKU数量 <span class="sort-icon">↕</span></th>
                            <th style="width: 130px;" class="sortable" onclick="sortTable('待处理SKU数量', this)">待处理SKU数量 <span class="sort-icon">↕</span></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-title">暂无数据</div>
                    <div style="font-size: 12px; margin-bottom: 10px;">根据当前筛选条件，未找到相关数据</div>
                    <a class="empty-state-link" href="javascript:resetFilter()">重置筛选</a>
                </div>
            </div>
            <div class="pagination-section">
                <span class="page-text">第</span>
                <input type="number" class="pagination-input" id="pageInput" value="1" min="1" onchange="jumpPage()">
                <span class="page-text">/ <span id="totalPages">1</span> 页</span>
                <button class="pagination-btn" onclick="firstPage()">首页</button>
                <button class="pagination-btn" onclick="prevPage()">上一页</button>
                <button class="pagination-btn" onclick="nextPage()">下一页</button>
                <button class="pagination-btn" onclick="lastPage()">末页</button>
            </div>
        </div>
    </div>

    <div class="modal" id="exportModal">
        <div class="modal-content">
            <div class="modal-title">选择导出格式</div>
            <div class="modal-options">
                <div class="modal-option" onclick="exportData('xlsx')">导出为 Excel (.xlsx)</div>
                <div class="modal-option" onclick="exportData('csv')">导出为 CSV (.csv)</div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeExportModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        const defaultState = {
            date: '2026-06-08',
            store: ['[7222]中免集团(北京)免税品有限公司', '[7223]中免集团北京大兴国际机场免税品有限公司'],
            category: ['[010101]免税进口烟', '[010102]免税进口酒', '[010103]免税国产烟'],
            class: ['[01]进口酒'],
            brand: ['[060139]Bulgari 宝格丽', '[060140]Louis Vuitton']
        };

        let dataState = {
            filterCollapsed: false,
            currentPage: 1,
            pageSize: 20,
            totalCount: 0,
            sortColumn: '',
            sortOrder: 'asc',
            data: []
        };

        function generateMockData() {
            const categories = ['[010101]免税进口烟', '[010102]免税进口酒', '[010103]免税国产烟', '[010104]免税国产酒', '[010105]免税香化'];
            const classes = ['[01]进口酒', '[02]进口烟', '[03]进口香化', '[04]国产酒', '[05]国产烟'];
            const brands = ['[060139]Bulgari 宝格丽', '[060140]Louis Vuitton', '[060141]Hermès', '[060142]Cartier', '[060143]Rolex'];
            const stores = ['[7222]中免集团(北京)免税品有限公司', '[7223]中免集团北京大兴国际机场免税品有限公司'];
            const data = [];

            for (let i = 1; i <= 68; i++) {
                const category = categories[i % categories.length];
                const mainClass = classes[i % classes.length];
                const brand = brands[i % brands.length];
                const store = stores[i % stores.length];
                data.push({
                    日期: '2026-06-08',
                    门店: store,
                    商品新分类: category,
                    大类: mainClass,
                    品牌: brand,
                    '正品SKU出样率': (78 + (i % 17) * 0.91).toFixed(2),
                    '免值品SKU出样率': (74 + (i % 13) * 1.08).toFixed(2),
                    '正品SKU数量': 120 + i * 3,
                    '免值品SKU数量': 85 + i * 2,
                    '待处理SKU数量': 8 + (i % 19)
                });
            }

            return data;
        }

        function init() {
            dataState.data = generateMockData();
            dataState.totalCount = dataState.data.length;
            document.getElementById('filterDate').value = defaultState.date;
            renderAllSummaries();
            renderTable();
            document.addEventListener('click', closeAllPanels);
        }

        function getSelectedValues(name) {
            return Array.from(document.querySelectorAll(`input[data-select="${name}"]:checked`)).map(item => item.value);
        }

        function renderSummary(name) {
            const selected = getSelectedValues(name);
            const summary = document.getElementById(`${name}Summary`);

            if (!selected.length) {
                summary.innerHTML = '<span class="summary-count">请选择</span>';
                return;
            }

            const first = selected[0];
            const extra = selected.length > 1 ? `<span class="summary-count">+${selected.length - 1}</span>` : '';
            summary.innerHTML = `<span class="summary-pill" title="${selected.join('、')}">${first}</span>${extra}`;
        }

        function renderAllSummaries() {
            ['store', 'category', 'class', 'brand'].forEach(renderSummary);
        }

        function toggleSelect(event, name) {
            event.stopPropagation();
            const panel = document.getElementById(`${name}Panel`);
            const box = panel.previousElementSibling;
            const isOpen = panel.classList.contains('show');
            closeAllPanels();
            if (!isOpen) {
                panel.classList.add('show');
                box.classList.add('open');
            }
        }

        function closeAllPanels(event) {
            if (event && event.target.closest('.multi-select')) {
                return;
            }
            document.querySelectorAll('.select-panel').forEach(panel => panel.classList.remove('show'));
            document.querySelectorAll('.select-box').forEach(box => box.classList.remove('open'));
        }

        function selectAllOptions(event, name, checked) {
            event.stopPropagation();
            document.querySelectorAll(`input[data-select="${name}"]`).forEach(item => {
                if (item.closest('.option-item').style.display !== 'none') {
                    item.checked = checked;
                }
            });
            renderAllSummaries();
        }

        function filterOptions(name, keyword) {
            const lower = keyword.trim().toLowerCase();
            document.querySelectorAll(`#${name}Options .option-item`).forEach(item => {
                const text = item.innerText.toLowerCase();
                item.style.display = !lower || text.includes(lower) ? 'flex' : 'none';
            });
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            const start = (dataState.currentPage - 1) * dataState.pageSize;
            const end = start + dataState.pageSize;
            const pageData = dataState.data.slice(start, end);

            if (!pageData.length) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                document.getElementById('totalPages').textContent = '1';
                document.getElementById('pageInput').value = 1;
                return;
            }

            emptyState.style.display = 'none';
            tbody.innerHTML = pageData.map(row => `
                <tr>
                    <td>${row.日期}</td>
                    <td title="${row.门店}">${row.门店}</td>
                    <td>${row.商品新分类}</td>
                    <td>${row.大类}</td>
                    <td title="${row.品牌}">${row.品牌}</td>
                    <td class="number">${row['正品SKU出样率']}%</td>
                    <td class="number">${row['免值品SKU出样率']}%</td>
                    <td class="number">${row['正品SKU数量']}</td>
                    <td class="number">${row['免值品SKU数量']}</td>
                    <td class="number">${row['待处理SKU数量']}</td>
                </tr>
            `).join('');

            const totalPages = Math.max(1, Math.ceil(dataState.data.length / dataState.pageSize));
            document.getElementById('totalPages').textContent = totalPages;
            document.getElementById('pageInput').value = dataState.currentPage;
        }

        function updateSortIcons(currentHeader) {
            document.querySelectorAll('.sort-icon').forEach(icon => {
                icon.classList.remove('active');
                icon.textContent = '↕';
            });
            if (!currentHeader) {
                return;
            }
            const icon = currentHeader.querySelector('.sort-icon');
            icon.classList.add('active');
            icon.textContent = dataState.sortOrder === 'asc' ? '↑' : '↓';
        }

        function sortTable(column, header) {
            if (dataState.sortColumn === column) {
                dataState.sortOrder = dataState.sortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                dataState.sortColumn = column;
                dataState.sortOrder = 'asc';
            }

            dataState.data.sort((a, b) => {
                const valA = parseFloat(a[column]);
                const valB = parseFloat(b[column]);
                return dataState.sortOrder === 'asc' ? valA - valB : valB - valA;
            });

            dataState.currentPage = 1;
            updateSortIcons(header);
            renderTable();
        }

        function queryData() {
            closeAllPanels();
            dataState.currentPage = 1;
            renderTable();
        }

        function resetFilter() {
            document.getElementById('filterDate').value = defaultState.date;
            ['store', 'category', 'class', 'brand'].forEach(name => {
                document.querySelectorAll(`input[data-select="${name}"]`).forEach(item => {
                    item.checked = defaultState[name].includes(item.value);
                });
                const search = document.querySelector(`#${name}Panel .select-search`);
                if (search) {
                    search.value = '';
                }
                filterOptions(name, '');
            });
            renderAllSummaries();
            closeAllPanels();
            dataState.currentPage = 1;
            renderTable();
        }

        function toggleFilter() {
            dataState.filterCollapsed = !dataState.filterCollapsed;
            const content = document.getElementById('filterContent');
            const button = document.getElementById('toggleBtn');
            content.classList.toggle('collapsed', dataState.filterCollapsed);
            button.textContent = dataState.filterCollapsed ? '展开' : '收起';
        }

        function firstPage() {
            dataState.currentPage = 1;
            renderTable();
        }

        function prevPage() {
            if (dataState.currentPage > 1) {
                dataState.currentPage -= 1;
                renderTable();
            }
        }

        function nextPage() {
            const totalPages = Math.max(1, Math.ceil(dataState.data.length / dataState.pageSize));
            if (dataState.currentPage < totalPages) {
                dataState.currentPage += 1;
                renderTable();
            }
        }

        function lastPage() {
            dataState.currentPage = Math.max(1, Math.ceil(dataState.data.length / dataState.pageSize));
            renderTable();
        }

        function jumpPage() {
            const totalPages = Math.max(1, Math.ceil(dataState.data.length / dataState.pageSize));
            const input = document.getElementById('pageInput');
            const page = Math.min(totalPages, Math.max(1, parseInt(input.value || '1', 10)));
            dataState.currentPage = page;
            renderTable();
        }

        function openExportModal() {
            document.getElementById('exportModal').classList.add('show');
        }

        function closeExportModal() {
            document.getElementById('exportModal').classList.remove('show');
        }

        function exportData(format) {
            alert(`已导出为 ${format.toUpperCase()} 格式`);
            closeExportModal();
        }

        window.onload = init;
    </script>
</body>
</html>
