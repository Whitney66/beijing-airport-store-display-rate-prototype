<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据报表原型库 - Prototypes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            margin: 0 auto 20px;
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #999;
        }

        .prototypes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .prototype-card {
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .prototype-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }

        .prototype-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background: #f0f2f5;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 13px;
            color: #999;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #bfbfbf;
        }

        .card-link {
            color: #667eea;
            font-weight: 500;
            text-decoration: none;
        }

        .card-link:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .footer {
            border-top: 1px solid #e8e8e8;
            padding-top: 20px;
            text-align: center;
            color: #999;
            font-size: 12px;
        }

        .add-btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            margin: 20px auto;
            display: block;
        }

        .add-btn:hover {
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📊</div>
            <h1 class="title">数据报表原型库</h1>
            <p class="subtitle">Prototypes Repository</p>
        </div>

        <div class="prototypes-grid" id="prototypes-list">
            <div class="prototype-card" onclick="location.href='./bj-airport-sample-rate/index.html'">
                <div class="card-icon">📦</div>
                <div class="card-title">北京机场店商品出样率统计表</div>
                <div class="card-desc">展示两家门店的库存分布及商品出样状况，支持多维度筛选和数据导出。</div>
                <div class="card-meta">
                    <span>2026-06-08</span>
                    <a href="./bj-airport-sample-rate/index.html" class="card-link">打开 →</a>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>💡 使用GitHub Pages托管，支持在线实时编辑和预览</p>
            <p>Repository: <a href="https://github.com/Whitney66/prototypes" style="color: #667eea;">https://github.com/Whitney66/prototypes</a></p>
        </div>
    </div>
</body>
</html>
